      5,25  5,20
      10,20 10,15
      15,15 15,10
      20,10 20,8
      25,8  25,5
      30,5  30,3
      35,3  35,1
      40,1  40,30
      5,30
    "/>
    <rect class="cls-3" x=".25" y=".25" width="48.5" height="29.5"/>
  </g>
</svg>
