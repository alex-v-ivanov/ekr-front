<svg id="Ogive" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 49 30">
  <defs>
    <style>
      .cls-1 { fill: #004c97; }
      .cls-2 { fill: #fff; }
      .cls-3 {
        stroke: #ccd0d4;
        stroke-width: .5px;
        fill: none;
      }
      .cls-4 {
        fill: none;      }
      .cls-5 {
        clip-path: url(#clippath);
      }
    </style>
    <clipPath id="clippath">
